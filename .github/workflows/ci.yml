name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-smoke:
    name: Legacy · Endpoint · Contract smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run focused live-smoke lane
        run: |
          mkdir -p artifacts
          npx vitest run \
            tests/client/api-path-prefix.test.ts \
            tests/client/idea-approve.test.tsx \
            tests/client/ideas.test.tsx \
            tests/client/ideas-legacy-status.test.tsx \
            tests/client/pipeline-all-done.test.tsx \
            tests/client/system-page.test.tsx \
            tests/server/agents-api.test.ts \
            tests/server/agents-id-mismatch.test.ts \
            tests/server/config-api.test.ts \
            tests/server/ideas-api.test.ts \
            tests/server/system-api.test.ts \
            tests/server/tasks-list-smoke.test.ts \
            tests/server/tasks-edge-cases.test.ts \
            tests/server/transition-validation.test.ts \
            --reporter=default \
            --reporter=json \
            --outputFile=artifacts/live-smoke-vitest.json 2>&1 | tee artifacts/live-smoke-console.log

      - name: Smoke failure summary
        if: failure()
        run: |
          echo "## Live-smoke failure summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '(FAIL|Error|✗|×|AssertionError)' artifacts/live-smoke-console.log | head -40 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Full output in live-smoke-artifacts." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live-smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-artifacts
          path: artifacts/
          retention-days: 7

  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
